# Spotly tracking broker

persistence true
persistence_location /mosquitto/data/

# MQTT over TCP — bridge service and native mobile clients (HiveMQ/CocoaMQTT)
listener 1883
protocol mqtt

# MQTT over WebSocket — React Native (paho-mqtt / mqtt.js) and browser clients
listener 9001
protocol websockets

# Auth: every client must present credentials (see docker-compose.yml for
# how to create the passwd file with mosquitto_passwd).
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# Keep queues bounded so a flooding client can't exhaust the broker.
max_queued_messages 1000
message_size_limit 4096
