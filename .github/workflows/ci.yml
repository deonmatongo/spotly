name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — syntax, load & smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/bridge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/bridge/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Syntax check all modules
        run: for f in *.js; do node --check "$f"; done

      - name: Load modules (fail fast on runtime import errors)
        env:
          DB_PATH: /tmp/ci-spotly.db
        run: |
          node -e "require('./db'); require('./security'); require('./observability'); \
                   require('./whatsapp-chat'); require('./admin'); require('./compliance'); \
                   require('./backup'); require('./order-policy'); require('./orders-ops'); \
                   require('./geo'); require('./merchant-onboard'); console.log('all modules load OK')"

      - name: Unit tests (node:test)
        env:
          DB_PATH: /tmp/ci-units.db
        run: npm run test:unit

      - name: Bus-contract smoke test
        run: npm run smoke --if-present

  shared:
    name: Shared — vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shared/package-lock.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run vitest
        run: npm test

  apps:
    name: Apps — typecheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [client-app, driver-app, merchant-app]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: TypeScript typecheck
        run: npx tsc --noEmit || echo "::warning::typecheck reported issues"
